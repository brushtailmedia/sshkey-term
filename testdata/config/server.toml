[server]
port = 2222
bind = "0.0.0.0"

[messages]
max_body_size = "16KB"

[retention]
purge_days = 0      # 0 = keep forever

[sync]
window_messages = 200
window_days = 7
history_page_size = 100

[files]
max_file_size = "50MB"
max_avatar_size = "256KB"
allowed_avatar_types = ["image/png", "image/jpeg"]

[devices]
max_per_user = 10

[rate_limits]
messages_per_second = 200
uploads_per_minute = 6000
connections_per_minute = 10
failed_auth_per_minute = 5
typing_per_second = 1
history_per_minute = 50

[shutdown]
grace_period = "100ms"

[logging]
level = "info"
file = "/var/sshkey-chat/server.log"
max_size_mb = 100
max_files = 5
format = "json"

[push.apns]
enabled = false
key_path = ""
key_id = ""
team_id = ""
bundle_id = ""
sandbox = false

[push.fcm]
enabled = false
credentials_path = ""
project_id = ""
