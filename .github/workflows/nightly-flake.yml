name: Nightly Flake

on:
  schedule:
    - cron: "15 2 * * *"
  workflow_dispatch:

jobs:
  shuffle-stress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
      - name: Install deps (Linux)
        run: sudo apt-get update && sudo apt-get install -y gcc
      - name: Coupling Guard
        run: bash .github/scripts/check_test_coupling.sh
      - name: Sleep Guard
        run: bash .github/scripts/check_test_sleeps.sh
      - name: Shuffle Stress (critical packages)
        run: |
          CGO_ENABLED=1 CGO_CFLAGS="-DSQLITE_ENABLE_FTS5" CGO_LDFLAGS="-lm" \
          go test -v -shuffle=on -count=20 -p 1 ./internal/client ./internal/store ./internal/protocol ./internal/tui
