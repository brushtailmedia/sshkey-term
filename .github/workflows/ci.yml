name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
      - name: Cross-Product Coupling Guard
        run: bash .github/scripts/check_test_coupling.sh
      - name: Sleep Guard
        run: bash .github/scripts/check_test_sleeps.sh
      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y gcc
      - name: Build
        run: CGO_ENABLED=1 CGO_CFLAGS="-DSQLITE_ENABLE_FTS5" CGO_LDFLAGS="-lm" go build .
      - name: Test (race)
        run: CGO_ENABLED=1 CGO_CFLAGS="-DSQLITE_ENABLE_FTS5" CGO_LDFLAGS="-lm" go test -race -count=1 -p 1 ./...
      - name: Test (short)
        run: CGO_ENABLED=1 CGO_CFLAGS="-DSQLITE_ENABLE_FTS5" CGO_LDFLAGS="-lm" go test -short -count=1 -p 1 ./...
      - name: Test (shuffle)
        run: CGO_ENABLED=1 CGO_CFLAGS="-DSQLITE_ENABLE_FTS5" CGO_LDFLAGS="-lm" go test -shuffle=on -count=1 -p 1 ./...
      - name: Coverage Guard
        run: CGO_ENABLED=1 CGO_CFLAGS="-DSQLITE_ENABLE_FTS5" CGO_LDFLAGS="-lm" bash .github/scripts/check_coverage.sh
      - name: Vet
        run: go vet ./...
      # staticcheck: catches bug classes go vet misses. Added 2026-04-25
      # after the post-v0.2.1 audit found SA4006 (this value is never
      # used) on a tea.Cmd that was appended to a discarded accumulator
      # — the save-as download goroutine silently never fired. CGO env
      # vars are required because the sqlcipher build is CGO-only.
      # Pinned to 2026.1 (the version Phase 21 F5 rebuilt against
      # Go 1.26.2).
      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@2026.1
      - name: Staticcheck
        run: CGO_ENABLED=1 CGO_CFLAGS="-DSQLITE_ENABLE_FTS5" CGO_LDFLAGS="-lm" staticcheck ./...
