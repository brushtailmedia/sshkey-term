name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    strategy:
      matrix:
        include:
          - runs_on: ubuntu-latest
            goos: linux
          - runs_on: macos-15-intel
            goos: darwin
          - runs_on: macos-15
            goos: darwin
    runs-on: ${{ matrix.runs_on }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"

      - name: Cross-Product Coupling Guard
        run: bash .github/scripts/check_test_coupling.sh

      - name: Sleep Guard
        run: bash .github/scripts/check_test_sleeps.sh

      - name: Install build deps (Linux)
        if: matrix.goos == 'linux'
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: Build
        env:
          CGO_ENABLED: "1"
          CGO_CFLAGS: "-DSQLITE_ENABLE_FTS5"
          CGO_LDFLAGS: ${{ matrix.goos == 'linux' && '-lm' || '' }}
        run: go build .

      - name: Test (race)
        env:
          CGO_ENABLED: "1"
          CGO_CFLAGS: "-DSQLITE_ENABLE_FTS5"
          CGO_LDFLAGS: ${{ matrix.goos == 'linux' && '-lm' || '' }}
        run: go test -race -count=1 -p 1 ./...

      - name: Test (short)
        env:
          CGO_ENABLED: "1"
          CGO_CFLAGS: "-DSQLITE_ENABLE_FTS5"
          CGO_LDFLAGS: ${{ matrix.goos == 'linux' && '-lm' || '' }}
        run: go test -short -count=1 -p 1 ./...

      - name: Test (shuffle)
        env:
          CGO_ENABLED: "1"
          CGO_CFLAGS: "-DSQLITE_ENABLE_FTS5"
          CGO_LDFLAGS: ${{ matrix.goos == 'linux' && '-lm' || '' }}
        run: go test -shuffle=on -count=1 -p 1 ./...

      - name: Coverage Guard
        env:
          CGO_ENABLED: "1"
          CGO_CFLAGS: "-DSQLITE_ENABLE_FTS5"
          CGO_LDFLAGS: ${{ matrix.goos == 'linux' && '-lm' || '' }}
        run: bash .github/scripts/check_coverage.sh

      # staticcheck on the release path: blocks a tag push if any new
      # SA-class finding lands. Added 2026-04-25 after the post-v0.2.1
      # audit — see ci.yml for the rationale. Pinned to the Phase 21
      # F5 baseline version. CGO env vars inherited from the matrix
      # leg (macOS omits -lm; Linux sets it).
      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@2026.1
      - name: Staticcheck
        env:
          CGO_ENABLED: "1"
          CGO_CFLAGS: "-DSQLITE_ENABLE_FTS5"
          CGO_LDFLAGS: ${{ matrix.goos == 'linux' && '-lm' || '' }}
        run: staticcheck ./...

  release-linux:
    needs: test
    strategy:
      matrix:
        include:
          - goarch: amd64
            cc: gcc
            packages: ""
          - goarch: arm64
            cc: aarch64-linux-gnu-gcc
            packages: gcc-aarch64-linux-gnu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"

      - name: Install cross-compiler
        if: matrix.packages != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.packages }}

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CGO_CFLAGS: "-DSQLITE_ENABLE_FTS5"
          CGO_LDFLAGS: "-lm"
          CC: ${{ matrix.cc }}
        run: |
          go build -ldflags="-s -w" -o sshkey-term .
          tar czf sshkey-term_${{ github.ref_name }}_linux_${{ matrix.goarch }}.tar.gz sshkey-term README.md LICENSE CHANGELOG.md

      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.goarch }}
          path: "*.tar.gz"

  release-macos:
    needs: test
    strategy:
      matrix:
        include:
          - goarch: amd64
            runs_on: macos-15-intel
          - goarch: arm64
            runs_on: macos-15
    runs-on: ${{ matrix.runs_on }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"

      - name: Build
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CGO_CFLAGS: "-DSQLITE_ENABLE_FTS5"
        run: |
          go build -ldflags="-s -w" -o sshkey-term .
          echo "MACOS_ZIP=sshkey-term_${{ github.ref_name }}_darwin_${{ matrix.goarch }}.zip" >> "$GITHUB_ENV"

      - name: Import Apple signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          python3 - <<'PY'
          import base64, os
          data = base64.b64decode(os.environ["APPLE_CERTIFICATE"])
          with open("certificate.p12", "wb") as f:
              f.write(data)
          PY

          KEYCHAIN_PATH="$RUNNER_TEMP/sshkey-term-signing.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import certificate.p12 -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          rm -f certificate.p12

          SIGNING_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F '\"' '/Developer ID Application/ {print $2; exit}')"
          if [ -z "$SIGNING_IDENTITY" ]; then
            echo "No 'Developer ID Application' identity found in imported certificate."
            security find-identity -v -p codesigning "$KEYCHAIN_PATH"
            exit 1
          fi
          echo "SIGNING_IDENTITY=$SIGNING_IDENTITY" >> "$GITHUB_ENV"

      - name: Sign macOS binary
        run: |
          codesign --force --options runtime --timestamp --sign "$SIGNING_IDENTITY" sshkey-term
          codesign --verify --verbose=4 sshkey-term

      - name: Build notarization archive
        run: |
          ditto -c -k --keepParent sshkey-term "$MACOS_ZIP"

      - name: Notarize macOS archive (API key)
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
        run: |
          # NOTE: GITHUB_ENV only propagates to *subsequent* steps,
          # not the current shell — so the key path must be a plain
          # shell variable here. Both the shell var and the python
          # writer use the same fixed $RUNNER_TEMP/AuthKey.p8 path.
          APPLE_API_KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          python3 - <<'PY'
          import base64, os
          data = base64.b64decode(os.environ["APPLE_API_PRIVATE_KEY"])
          with open(os.path.join(os.environ["RUNNER_TEMP"], "AuthKey.p8"), "wb") as f:
              f.write(data)
          PY

          test -s "$APPLE_API_KEY_PATH"

          xcrun notarytool submit "$MACOS_ZIP" \
            --key "$APPLE_API_KEY_PATH" \
            --key-id "$APPLE_API_KEY" \
            --issuer "$APPLE_API_ISSUER" \
            --wait
          rm -f "$APPLE_API_KEY_PATH"

      - uses: actions/upload-artifact@v4
        with:
          name: darwin-${{ matrix.goarch }}
          path: "*.zip"

  publish:
    needs: [release-linux, release-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum *.tar.gz *.zip > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            *.tar.gz
            *.zip
            checksums.txt
