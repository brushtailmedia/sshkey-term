name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Install SQLCipher deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y gcc
      - name: Build
        run: CGO_ENABLED=1 CGO_CFLAGS="-DSQLITE_ENABLE_FTS5" CGO_LDFLAGS="${{ runner.os == 'Linux' && '-lm' || '' }}" go build .
      - name: Test
        run: CGO_ENABLED=1 CGO_CFLAGS="-DSQLITE_ENABLE_FTS5" CGO_LDFLAGS="${{ runner.os == 'Linux' && '-lm' || '' }}" go test -count=1 -p 1 ./...

  release-linux:
    needs: test
    strategy:
      matrix:
        include:
          - goarch: amd64
            cc: gcc
          - goarch: arm64
            cc: aarch64-linux-gnu-gcc
            packages: gcc-aarch64-linux-gnu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Install cross-compiler
        if: matrix.packages != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.packages }}
      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CGO_CFLAGS: "-DSQLITE_ENABLE_FTS5"
          CGO_LDFLAGS: "-lm"
          CC: ${{ matrix.cc }}
        run: |
          go build -ldflags="-s -w" -o sshkey-chat .
          tar czf sshkey-term_${{ github.ref_name }}_linux_${{ matrix.goarch }}.tar.gz sshkey-chat README.md LICENSE CHANGELOG.md
      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.goarch }}
          path: "*.tar.gz"

  release-macos:
    needs: test
    strategy:
      matrix:
        include:
          - goarch: amd64
          - goarch: arm64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CGO_CFLAGS: "-DSQLITE_ENABLE_FTS5"
        run: |
          go build -ldflags="-s -w" -o sshkey-chat .
          tar czf sshkey-term_${{ github.ref_name }}_darwin_${{ matrix.goarch }}.tar.gz sshkey-chat README.md LICENSE CHANGELOG.md
      - uses: actions/upload-artifact@v4
        with:
          name: darwin-${{ matrix.goarch }}
          path: "*.tar.gz"

  publish:
    needs: [release-linux, release-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Generate checksums
        run: sha256sum *.tar.gz > checksums.txt
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            *.tar.gz
            checksums.txt
