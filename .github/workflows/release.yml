name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    strategy:
      matrix:
        include:
          - runs_on: ubuntu-latest
            goos: linux
          - runs_on: macos-15-intel
            goos: darwin
          - runs_on: macos-15
            goos: darwin
    runs-on: ${{ matrix.runs_on }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"

      - name: Install build deps (Linux)
        if: matrix.goos == 'linux'
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: Build
        env:
          CGO_ENABLED: "1"
          CGO_CFLAGS: "-DSQLITE_ENABLE_FTS5"
          CGO_LDFLAGS: ${{ matrix.goos == 'linux' && '-lm' || '' }}
        run: go build .

      - name: Test
        env:
          CGO_ENABLED: "1"
          CGO_CFLAGS: "-DSQLITE_ENABLE_FTS5"
          CGO_LDFLAGS: ${{ matrix.goos == 'linux' && '-lm' || '' }}
        run: go test -count=1 -p 1 ./...

  release-linux:
    needs: test
    strategy:
      matrix:
        include:
          - goarch: amd64
            cc: gcc
            packages: ""
          - goarch: arm64
            cc: aarch64-linux-gnu-gcc
            packages: gcc-aarch64-linux-gnu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"

      - name: Install cross-compiler
        if: matrix.packages != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.packages }}

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CGO_CFLAGS: "-DSQLITE_ENABLE_FTS5"
          CGO_LDFLAGS: "-lm"
          CC: ${{ matrix.cc }}
        run: |
          go build -ldflags="-s -w" -o sshkey-chat .
          tar czf sshkey-term_${{ github.ref_name }}_linux_${{ matrix.goarch }}.tar.gz sshkey-chat README.md LICENSE CHANGELOG.md

      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.goarch }}
          path: "*.tar.gz"

  release-macos:
    needs: test
    strategy:
      matrix:
        include:
          - goarch: amd64
            runs_on: macos-15-intel
          - goarch: arm64
            runs_on: macos-15
    runs-on: ${{ matrix.runs_on }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"

      - name: Build
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CGO_CFLAGS: "-DSQLITE_ENABLE_FTS5"
        run: |
          go build -ldflags="-s -w" -o sshkey-chat .
          tar czf sshkey-term_${{ github.ref_name }}_darwin_${{ matrix.goarch }}.tar.gz sshkey-chat README.md LICENSE CHANGELOG.md

      - uses: actions/upload-artifact@v4
        with:
          name: darwin-${{ matrix.goarch }}
          path: "*.tar.gz"

  publish:
    needs: [release-linux, release-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum *.tar.gz > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            *.tar.gz
            checksums.txt
